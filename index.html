<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZGADNIJ v1009</title>
  <style>
    :root {
      --bg1: #04101d;
      --bg2: #0a1830;
      --panel: rgba(12, 28, 74, 0.88);
      --line: rgba(255,255,255,0.16);
      --text: #eef5ff;
      --muted: #b8c7e6;
      --shadow: 0 24px 60px rgba(0,0,0,0.42);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; font-family: Arial, Helvetica, sans-serif; color: var(--text); }
    body {
      background:
        radial-gradient(circle at 15% 20%, rgba(87,216,255,0.10), transparent 0 22%),
        radial-gradient(circle at 85% 80%, rgba(77,124,255,0.18), transparent 0 24%),
        linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 100%);
      overflow-x: hidden;
    }
    .hidden { display: none !important; }

    .screen-start {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; padding: 24px;
      background: linear-gradient(180deg, #04101d 0%, #0a1830 100%);
    }
    .start-frame {
      position: relative; width: min(94vw, 1500px); aspect-ratio: 16 / 9; border-radius: 28px; overflow: hidden;
      box-shadow: 0 30px 90px rgba(0,0,0,0.45); border: 1px solid rgba(255,255,255,0.14); background: #07111f;
    }
    .start-image { width: 100%; height: 100%; object-fit: cover; display: block; user-select: none; -webkit-user-drag: none; }
    .start-caption, .lang-start-btn {
      position: absolute; z-index: 3; border-radius: 999px; border: 1px solid rgba(255,255,255,0.18);
      background: rgba(7,17,31,0.62); color: var(--text); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      font-weight: 700;
    }
    .start-caption { left: 18px; top: 18px; padding: 12px 16px; font-size: 14px; letter-spacing: 0.08em; }
    .lang-start-btn { right: 18px; top: 18px; padding: 12px 18px; font-size: 15px; cursor: pointer; }
    .play-hotspot {
      position: absolute; left: 50%; bottom: 4.6%; transform: translateX(-50%); width: 24%; height: 14%; min-width: 180px; min-height: 70px;
      border: none; background: transparent; cursor: pointer; border-radius: 999px;
    }
    .version-tag {
      position: fixed; right: 16px; bottom: 12px; z-index: 9999; padding: 8px 12px; border-radius: 999px;
      background: rgba(5, 11, 20, 0.82); color: #dce9ff; border: 1px solid rgba(255,255,255,0.18); font-size: 13px; letter-spacing: 0.08em;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    }

    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(2,9,21,0.70); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      display: flex; align-items: center; justify-content: center; padding: 24px; z-index: 1000;
    }
    .modal {
      width: min(92vw, 620px); min-height: 540px; border-radius: 32px; border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(16,41,106,0.96) 0%, rgba(8,25,71,0.96) 100%); box-shadow: var(--shadow);
      padding: 24px 28px 28px; position: relative;
    }
    .modal-badge {
      display: inline-flex; padding: 10px 16px; border-radius: 999px; border: 1px solid rgba(255,255,255,0.18); background: rgba(255,255,255,0.06);
      font-size: 14px; font-weight: 700; letter-spacing: 0.05em; margin-bottom: 18px;
    }
    .modal h2 { margin: 0 0 14px; font-size: clamp(34px, 5vw, 58px); line-height: 0.94; }
    .modal p { margin: 0 0 22px; color: var(--muted); font-size: 16px; line-height: 1.45; }
    .room-actions {
      display: flex; flex-direction: column; align-items: center; gap: 18px; padding-top: 8px;
    }
    .img-btn {
      border: none; background: transparent; padding: 0; cursor: pointer; display: inline-flex; align-items: center; justify-content: center;
      transition: transform 0.15s ease, filter 0.15s ease;
    }
    .img-btn:hover { transform: translateY(-2px) scale(1.01); filter: brightness(1.05); }
    .img-btn img {
      display: block; width: min(100%, 380px); max-width: 380px; height: auto; object-fit: contain;
      filter: drop-shadow(0 8px 18px rgba(0,0,0,0.35));
    }
    .fallback-btn {
      min-width: 260px; max-width: 380px; width: 100%; border: 1px solid rgba(255,255,255,0.20); border-radius: 22px;
      padding: 18px 22px; font-size: 24px; font-weight: 800; color: white;
      background: linear-gradient(180deg, #1f7cff 0%, #153de5 100%);
      box-shadow: inset 0 2px 0 rgba(255,255,255,0.25), 0 10px 20px rgba(0,0,0,0.25);
    }
    .field-group { display: grid; gap: 14px; margin-top: 10px; }
    .field-label { font-size: 14px; color: #c9d8f7; font-weight: 700; }
    .field-input {
      width: 100%; border: 1px solid rgba(255,255,255,0.16); background: rgba(255,255,255,0.08); color: white; border-radius: 18px;
      padding: 16px 18px; font-size: 18px; outline: none;
    }
    .inline-actions { display: flex; flex-direction: column; align-items: center; gap: 18px; margin-top: 26px; }
    .footer-space { height: 52px; }

    @media (max-width: 900px) {
      .modal { width: min(94vw, 540px); padding: 22px; min-height: auto; }
      .img-btn img { max-width: 320px; }
      .fallback-btn { max-width: 320px; font-size: 21px; }
    }
    @media (max-width: 680px) {
      .start-frame { width: 96vw; }
      .modal { width: min(96vw, 430px); border-radius: 24px; padding: 18px; }
      .modal h2 { font-size: 40px; }
      .modal p { font-size: 14px; }
      .img-btn img { max-width: 270px; }
      .fallback-btn { min-width: 0; max-width: 270px; font-size: 18px; padding: 16px 18px; }
      .start-caption, .lang-start-btn { font-size: 12px; padding: 10px 12px; }
      .play-hotspot { width: 38%; height: 18%; min-width: 130px; min-height: 56px; }
    }
  </style>
</head>
<body>
  <section class="screen-start" id="screenStart">
    <div class="start-frame">
      <div class="start-caption" id="startCaption">STRONA STARTOWA</div>
      <button class="lang-start-btn" id="langStartBtn">PL / EN</button>
      <img src="img_startowa.png" alt="ZGADNIJ I WYGRAJ - ekran startowy" class="start-image" />
      <button class="play-hotspot" id="playHotspot" aria-label="Graj"></button>
    </div>
  </section>

  <div class="modal-backdrop hidden" id="roomChoiceModal">
    <div class="modal">
      <div class="modal-badge" id="roomBadge">POKÓJ GRY</div>
      <h2 id="roomTitle">Wybierz akcję pokoju</h2>
      <p id="roomDesc">Po utworzeniu profilu wybierz, czy chcesz utworzyć pokój, wejść do pokoju, zalogować nowego gracza albo wyjść.</p>
      <div class="room-actions">
        <button class="img-btn" id="btnCreateRoom"></button>
        <button class="img-btn" id="btnEnterRoom"></button>
        <button class="img-btn" id="btnNewLogin"></button>
        <button class="img-btn" id="btnExit"></button>
      </div>
    </div>
  </div>

  <div class="modal-backdrop hidden" id="enterRoomModal">
    <div class="modal" style="width:min(92vw,560px); min-height:auto;">
      <div class="modal-badge" id="enterBadge">DOŁĄCZ DO POKOJU</div>
      <h2 id="enterTitle">Wpisz kod pokoju</h2>
      <p id="enterDesc">Podaj kod pokoju, aby dołączyć do rozgrywki.</p>
      <div class="field-group">
        <label class="field-label" for="roomCode" id="roomCodeLabel">Kod pokoju</label>
        <input class="field-input" id="roomCode" maxlength="20" autocomplete="off" />
      </div>
      <div class="inline-actions">
        <button class="img-btn" id="btnOkEnter"></button>
        <button class="img-btn" id="btnBackEnter"></button>
      </div>
    </div>
  </div>

  <div class="version-tag">ZGADNIJ v1009</div>
  <div class="footer-space"></div>

  <script>
    const VERSION = 'ZGADNIJ v1009';
    let lang = 'pl';

    const t = {
      pl: {
        startCaption: 'STRONA STARTOWA',
        roomBadge: 'POKÓJ GRY',
        roomTitle: 'Wybierz akcję pokoju',
        roomDesc: 'Po utworzeniu profilu wybierz, czy chcesz utworzyć pokój, wejść do pokoju, zalogować nowego gracza albo wyjść.',
        enterBadge: 'DOŁĄCZ DO POKOJU',
        enterTitle: 'Wpisz kod pokoju',
        enterDesc: 'Podaj kod pokoju, aby dołączyć do rozgrywki.',
        roomCodeLabel: 'Kod pokoju',
        createRoom: 'Załóż nowy pokój',
        enterRoom: 'Dołącz do pokoju',
        newLogin: 'Dołącz na innym urządzeniu',
        exit: 'Wyjście',
        ok: 'OK',
        back: 'Cofnij',
        createInfo: 'Okno zakładania pokoju podłączymy w następnym kroku.',
        savedInfo: 'Kod pokoju został zapisany lokalnie.',
      },
      en: {
        startCaption: 'START SCREEN',
        roomBadge: 'GAME ROOM',
        roomTitle: 'Choose room action',
        roomDesc: 'After creating a profile, choose whether you want to create a room, enter a room, sign in a new player, or exit.',
        enterBadge: 'ENTER ROOM',
        enterTitle: 'Type room code',
        enterDesc: 'Enter the room code to join the game.',
        roomCodeLabel: 'Room code',
        createRoom: 'Create room',
        enterRoom: 'Enter room',
        newLogin: 'Login on another device',
        exit: 'Exit',
        ok: 'OK',
        back: 'Back',
        createInfo: 'The create room window will be connected in the next step.',
        savedInfo: 'Room code saved locally.',
      }
    };

    function btnPath(name) {
      return `ui/buttons/${lang}/${name}`;
    }

    function setButtonContent(el, imgName, fallbackText) {
      const img = new Image();
      img.onload = () => {
        el.innerHTML = '';
        img.alt = fallbackText;
        el.appendChild(img);
      };
      img.onerror = () => {
        el.innerHTML = `<div class="fallback-btn">${fallbackText}</div>`;
      };
      img.src = btnPath(imgName);
    }

    function render() {
      const c = t[lang];
      document.documentElement.lang = lang;
      document.title = VERSION;
      document.getElementById('startCaption').textContent = c.startCaption;
      document.getElementById('langStartBtn').textContent = 'PL / EN';
      document.getElementById('roomBadge').textContent = c.roomBadge;
      document.getElementById('roomTitle').textContent = c.roomTitle;
      document.getElementById('roomDesc').textContent = c.roomDesc;
      document.getElementById('enterBadge').textContent = c.enterBadge;
      document.getElementById('enterTitle').textContent = c.enterTitle;
      document.getElementById('enterDesc').textContent = c.enterDesc;
      document.getElementById('roomCodeLabel').textContent = c.roomCodeLabel;
      document.getElementById('roomCode').placeholder = c.roomCodeLabel;

      setButtonContent(document.getElementById('btnCreateRoom'), 'btn_create_room.png', c.createRoom);
      setButtonContent(document.getElementById('btnEnterRoom'), 'btn_enter_room.png', c.enterRoom);
      setButtonContent(document.getElementById('btnNewLogin'), 'btn_new_login.png', c.newLogin);
      setButtonContent(document.getElementById('btnExit'), 'btn_exit.png', c.exit);
      setButtonContent(document.getElementById('btnOkEnter'), 'btn_ok.png', c.ok);
      setButtonContent(document.getElementById('btnBackEnter'), 'btn_back.png', c.back);
    }

    function openRoomChoice() {
      document.getElementById('roomChoiceModal').classList.remove('hidden');
      document.getElementById('screenStart').classList.add('hidden');
    }
    function closeAllToStart() {
      document.getElementById('roomChoiceModal').classList.add('hidden');
      document.getElementById('enterRoomModal').classList.add('hidden');
      document.getElementById('screenStart').classList.remove('hidden');
    }
    function openEnterRoom() {
      document.getElementById('roomChoiceModal').classList.add('hidden');
      document.getElementById('enterRoomModal').classList.remove('hidden');
    }
    function backToRoomChoice() {
      document.getElementById('enterRoomModal').classList.add('hidden');
      document.getElementById('roomChoiceModal').classList.remove('hidden');
    }

    document.getElementById('langStartBtn').addEventListener('click', () => { lang = lang === 'pl' ? 'en' : 'pl'; render(); });
    document.getElementById('playHotspot').addEventListener('click', openRoomChoice);
    document.getElementById('btnEnterRoom').addEventListener('click', openEnterRoom);
    document.getElementById('btnBackEnter').addEventListener('click', backToRoomChoice);
    document.getElementById('btnExit').addEventListener('click', closeAllToStart);
    document.getElementById('btnCreateRoom').addEventListener('click', () => alert(t[lang].createInfo));
    document.getElementById('btnNewLogin').addEventListener('click', closeAllToStart);
    document.getElementById('btnOkEnter').addEventListener('click', () => {
      localStorage.setItem('zgadnij_last_room_code', document.getElementById('roomCode').value.trim());
      alert(t[lang].savedInfo);
    });

    render();
  </script>
</body>
</html>
